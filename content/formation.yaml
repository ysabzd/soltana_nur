modules:
  - title: Module 1 — Connais ta valeur
    description: Identifie ce que tu apportes vraiment. Arrête de minimiser. Construis ton récit de valeur.
  - title: Module 2 — Présence magnétique
    description: Corps, voix, regard. Incarne ta souveraineté avant même de parler.
  - title: Module 3 — Valeur perçue en action
    description: Personal branding éditorial, visibilité assumée, communication sans compromis.
  - title: Module 4 — Négociation souveraine
    description: Prix, contrats, limites. Négocie sans te trahir — avec clarté et désir.
  - title: Module 5 — Deviens impossible à ignorer
    description: Intégration, rituels, plan d'action. Tu choisis. Tu rayonnes.
faq:
  - question: À qui s'adresse cette formation ?
    answer: Aux femmes brillantes qui savent ce qu'elles valent mais peinent à le faire percevoir. Tu veux transformer ta valeur réelle en valeur perçue — sans te trahir.
  - question: Quel est le format ?
    answer: Modules vidéo, exercices d'incarnation, templates de négociation et accès à la communauté Pussycat Queens. Tu avances à ton rythme, avec un cadre clair.
  - question: Combien de temps ai-je accès au contenu ?
    answer: Accès illimité à vie. Tu peux revisiter les modules autant que nécessaire — la transformation demande de la répétition.
  - question: Y a-t-il un accompagnement ?
    answer: La formation inclut des sessions de questions-réponses en direct et l'accès à la communauté. Pour un accompagnement personnalisé, explore le coaching 1:1.
