metaDescription: Un espace où la pleine conscience rencontre la maîtrise. Coaching personnalisé pour incarner ta souveraineté.
heroEyebrow: Coaching 1:1
heroTitle: Là où la présence rencontre la maîtrise.
heroSubtitle: Un accompagnement intime et exigeant. Toi, ta vision, ta souveraineté, sans filtre, sans généralités.
forWhoTitle: Ce coaching est pour toi si…
forWhoDescription: Tu es prête pour un travail profond. Tu veux de la clarté, de la présence, des résultats concrets. Tu ne cherches pas des réponses toutes faites. Tu cherches à devenir.
processTitle: Comment ça se passe
includedTitle: Ce que tu reçois
includedDescription: Sessions en visio de 60 minutes. Plan d'action personnalisé entre chaque session. Accès direct par WhatsApp pour les questions urgentes. Minimum 3 mois d'accompagnement.
ctaTitle: Postule pour un accompagnement
ctaDescription: Contacte-moi sur WhatsApp pour une première conversation.
ctaButton: Demander un appel découverte
ctaWhatsappMessage: Bonjour Soltana, je souhaite en savoir plus sur le coaching 1:1.
steps:
  - step: "01"
    title: Clarté
    description: On identifie ce qui te retient. Les schémas, les peurs, les désirs non formulés.
  - step: "02"
    title: Vision
    description: Tu définis qui tu deviens. Pas qui tu « devrais » être. Qui tu choisis d'être.
  - step: "03"
    title: Incarnation
    description: Présence, communication, négociation. On traduit la vision en actions concrètes.
  - step: "04"
    title: Souveraineté
    description: Tu intègres. Tu décides. Tu ne demandes plus la permission.
faq:
  - question: Pour qui est le coaching 1:1 ?
    answer: Pour les femmes prêtes à un travail profond et personnalisé. Tu veux de la clarté, de la présence, et des résultats concrets, pas des généralités.
  - question: Comment se déroule une session ?
    answer: En visio, 60 minutes. On identifie ce qui bloque, on clarifie ta vision, on construit des actions incarnées. Tu repars avec de la clarté et un plan.
  - question: Quelle est la durée d'un accompagnement ?
    answer: Minimum 3 mois pour une transformation durable. Certains programmes s'étendent sur 6 mois selon tes objectifs.
