title: presence-magnetique-en-reunion
excerpt: Tu n'as pas besoin de parler plus. Tu as besoin d'occuper l'espace différemment. Voici comment.
date: 2026-04-10
readTime: 4 min
featured: false
pullQuote: La présence magnétique commence avant que tu ouvres la bouche.
paragraphs:
  - La plupart des femmes brillantes préparent ce qu'elles vont dire. Peu préparent comment elles vont être. Pourtant, c'est la présence qui ouvre les portes avant les mots.
  - "Avant ta prochaine réunion : trois respirations. Épaules basses. Regard stable. Tu n'es pas là pour convaincre. Tu es là pour incarner."
  - "Pendant la réunion : parle moins, écoute plus. Quand tu interviens, fais-le une fois, clairement, sans t'excuser."
