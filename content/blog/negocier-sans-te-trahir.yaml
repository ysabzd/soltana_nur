title: negocier-sans-te-trahir
headline: Négocier sans te trahir
excerpt: La négociation n'est pas un combat. C'est un acte de respect, envers toi d'abord.
date: 2026-04-15
readTime: 5 min
featured: false
pullQuote: Négocier sans te trahir, c'est connaître ton plancher avant d'entrer dans la pièce.
paragraphs:
  - Tu adoucis tes demandes. Tu justifies tes prix. Tu attends qu'on te propose au lieu de poser ton cadre. Ce n'est pas de la modestie. C'est de l'auto-sabotage.
  - Négocier sans te trahir, c'est connaître ton plancher avant d'entrer dans la pièce. C'est savoir ce que tu refuses, pas seulement ce que tu veux.
  - "Avant ta prochaine négociation : écris ton minimum acceptable. Puis ton idéal. Puis ce que tu es prête à offrir en échange. Sans te diminuer."
