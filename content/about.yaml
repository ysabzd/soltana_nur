metaDescription: Juriste, ESCP, fondatrice de l'École des Pussycat Queens. De 0 à 10 millions de repas sauvés — la leçon de la valeur perçue.
heroEyebrow: Qui je suis
heroTitle: Connais ta valeur. Deviens impossible à ignorer.
backgroundTitle: Background
backgroundP1: À 30 ans, j'ai une décennie derrière moi à comprendre pourquoi certaines femmes créent des opportunités là où d'autres voient des murs. Pas parce qu'elles sont plus intelligentes. Parce qu'elles incarnent une valeur que les autres ressentent avant même qu'elles n'ouvrent la bouche.
backgroundP2: Juriste en droit des affaires, formée à la RSE puis à la direction commerciale à l'ESCP. Ma carrière s'est bâtie sur l'influence, la confiance, la valeur perçue — pas sur le volume de preuves.
backgroundP3: Première salariée d'une association de lutte contre la précarité alimentaire — de zéro à 20 personnes, 1 000 partenaires, 700 000 € de recettes annuelles, plus de 10 millions de repas sauvés. Pas avec plus de données. Avec plus de présence.
pullQuote: La leçon que l'école n'enseigne pas — la valeur perçue change tout.
visionTitle: Comment je vois les choses dans la vie
visionP1: Je vois des femmes brillantes qui minimisent leur talent. Qui négocient leurs désirs avant même de les formuler. Qui attendent qu'on les remarque au lieu de rayonner.
visionP2: Ce n'est pas un problème de compétence. C'est un problème d'incarnation. Tu sais ce que tu vaux — tu ne le fais juste pas sentir.
visionP3: J'ai créé l'École des Pussycat Queens™️ pour ça. Un espace où tu arrêtes de demander la permission. Où tu choisis — souveraine, magnétique, assumée. De la valeur réelle à la valeur perçue.
