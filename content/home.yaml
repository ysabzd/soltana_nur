manifestoEyebrow: Manifesto
manifestoTitle: De la valeur réelle à la valeur perçue.
manifestoP1: Tu as les compétences. Les résultats. La preuve. Mais on ne te voit pas à ta juste mesure, parce que tu minimises, tu négocies, tu attends.
manifestoP2: Ne demande plus la permission. Choisis d'incarner ta souveraineté. Magnétique, assumée, impossible à ignorer.
pourQuiEyebrow: Pour qui ?
pourQuiTitle: Tu te reconnais ?
pourQuiDescription: Brillante. Compétente. Et pourtant, invisible à ta juste mesure.
pourQuiCards:
  - title: Tu es brillante et tu le minimises
    description: Tu sais ce que tu vaux, mais tu le dis à voix basse. Tu attends qu'on te remarque au lieu de rayonner.
  - title: Tu négocies avant de choisir
    description: Tu formules tes désirs en les adoucissant. Tu demandes la permission là où tu pourrais décider.
  - title: Tu veux être impossible à ignorer
    description: Pas plus bruyante, plus magnétique. Présente, assumée, souveraine. Incarnée.
