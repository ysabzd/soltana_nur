aboutEyebrow: À propos
aboutTitle: Juriste. ESCP. 10 millions de repas sauvés.
aboutP1: J'ai passé une décennie à comprendre pourquoi certaines femmes créent des opportunités là où d'autres voient des murs. La leçon que l'école n'enseigne pas. La valeur perçue change tout.
aboutP2: C'est pour ça que j'ai créé l'École des Pussycat Queens™️, un espace pour les femmes qui choisissent d'incarner leur pouvoir.
